dataset_dir: ~/Documents/Uni/Project_AI/ltr_datasets
experiment: test
random_state: 2021
use_cross_validation: false
sample_queries: null
features: all
relevance: deep
relevance_noise: 0.0
relevance_quantization: false
train_clicks: 1000000
val_clicks: 500000
test_clicks: 500000
policy_strength: 1
policy_temperature: 0
bias_strength: 1.0
param_shift: 3
use_propensity_weighting: false
freeze_bias_tower: true
single_param: false
param_idx: 1
save_test_datasets: false
load_test_datasets: false
test_dataset_name: test_dataset_name.pkl
test_click_dataset_name: test_click_dataset.pkl
num_groups: 1
docs_per_group: 10
D: 100
s_group: 0.0
s_doc: 0.5
num_queries: 10
label_type: deep
use_baidu: true
baidu_subset: train_Baidu_ULTRA_part1_multi_bias.npz
bias_type: media_type
data:
  dataset:
    _target_: two_tower_confounding.data.datasets.custom.CustomDatasetDeep
    base_dir: ${dataset_dir}
    num_groups: ${num_groups}
    docs_per_group: ${docs_per_group}
    D: ${D}
    s_group: ${s_group}
    s_doc: ${s_doc}
    random_seed: ${random_state}
    num_queries: ${num_queries}
  preprocessor:
    _target_: two_tower_confounding.data.preprocessing.Preprocessor
    normalize_features: true
    generate_query_document_ids: true
    sample_queries: ${sample_queries}
    top_documents_per_query: 10
    min_relevance_per_query: 1
    random_state: ${random_state}
    relevance: ${relevance}
    features: ${features}
    relevance_noise: ${relevance_noise}
    relevance_quantization: ${relevance_quantization}
logging_policy_ranker:
  _target_: two_tower_confounding.simulation.logging_policy.rankers.NeuralRanker
  model_type: linear
  policy_strength: ${policy_strength}
  random_state: ${random_state}
logging_policy_sampler:
  _target_: two_tower_confounding.simulation.logging_policy.samplers.EGreedySampler
  policy_temperature: ${policy_temperature}
  random_state: ${random_state}
bias_tower:
  _target_: two_tower_confounding.models.towers.MultiEmbeddingBiasTower
  _partial_: true
  feature_sizes:
  - 100
  - 200
  - 300
  embedding_dims: 1
  hidden_dims: 32
  rngs: ???
relevance_tower:
  _target_: two_tower_confounding.models.towers.DeepRelevanceTower
  _partial_: true
  features: ???
  layers: 2
  hidden_units: 32
  dropout: 0
  rngs: ???
