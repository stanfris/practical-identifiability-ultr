hydra:
  run:
    dir: reultss
  sweep:
    dir: results/${experiment}
    subdir: ${hydra.job.override_dirname}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - experiment=Deterministic_Custom_Data
    - data=Custom_dataset
    - relevance=deep
    - logging_policy_ranker=deep
    - relevance_tower=deep
    - policy_strength=1
    - policy_temperature=0.333
    - random_state=2021
    - logging_policy_sampler=e_greedy
    - save_test_datasets=True
    - load_test_datasets=True
    - param_shift=3
    - param_idx=2
    - single_param=True
    - freeze_bias_tower=True
    - test_dataset_name=test_dataset_policy_temperature0.0_.pkl
    - test_click_dataset_name=test_click_dataset_policy_temperature0.0_.pkl
  job:
    name: varying
    chdir: true
    override_dirname: data=Custom_dataset,experiment=Deterministic_Custom_Data,logging_policy_ranker=deep,logging_policy_sampler=e_greedy,policy_temperature=0.333,relevance=deep,relevance_tower=deep
    id: '0'
    num: 0
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys:
        - freeze_bias_tower
        - param_shift
        - param_idx
        - single_param
        - save_test_datasets
        - load_test_datasets
        - test_dataset_name
        - test_click_dataset_name
        - num_groups
        - D
        - s_group
        - label_type
        - policy_strength
        - random_state
        - use_baidu
        - bias_type
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/stanf/Documents/Uni/Project_AI/two-tower-confounding
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/stanf/Documents/Uni/Project_AI/two-tower-confounding/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /Users/stanf/Documents/Uni/Project_AI/two-tower-confounding/results/Deterministic_Custom_Data/data=Custom_dataset,experiment=Deterministic_Custom_Data,logging_policy_ranker=deep,logging_policy_sampler=e_greedy,policy_temperature=0.333,relevance=deep,relevance_tower=deep
    choices:
      relevance_tower: deep
      bias_tower: embedding
      logging_policy_sampler: e_greedy
      logging_policy_ranker: deep
      data: Custom_dataset
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
