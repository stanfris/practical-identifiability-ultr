hydra:
  run:
    dir: results
  sweep:
    dir: results/${experiment}
    subdir: ${hydra.job.override_dirname}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    timeout_min: 3600
    cpus_per_task: 16
    gpus_per_node: null
    tasks_per_node: 1
    mem_gb: 32
    nodes: 1
    name: ${hydra.job.name}
    stderr_to_stdout: false
    _target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
    partition: gpu
    qos: null
    comment: null
    constraint: null
    exclude: null
    gres: gpu:1
    cpus_per_gpu: null
    gpus_per_task: null
    mem_per_gpu: null
    mem_per_cpu: null
    account: null
    signal_delay_s: 120
    max_num_timeout: 0
    additional_parameters: {}
    array_parallelism: 4
    setup: null
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - experiment=2-model-fit-deep
    - data=mslr30k
    - relevance=deep
    - logging_policy_ranker=deep
    - relevance_tower=deep
    - policy_strength=0
    - policy_temperature=0,0.333,0.666,1.0
    - random_state=2021,2022,2023
    - +launcher=slurm
  job:
    name: main
    chdir: true
    override_dirname: +launcher=slurm,data=mslr30k,experiment=2-model-fit-deep,logging_policy_ranker=deep,policy_strength=0,policy_temperature=0,0.333,0.666,1.0,random_state=2021,2022,2023,relevance=deep,relevance_tower=deep
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/phager/two-tower-confounding
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/phager/two-tower-confounding/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      launcher: slurm
      relevance_tower: deep
      bias_tower: embedding
      logging_policy_sampler: e_greedy
      logging_policy_ranker: deep
      data: mslr30k
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: submitit_slurm
      hydra/output: default
  verbose: false
dataset_dir: /ivi/ilps/projects/ltr_datasets
experiment: 2-model-fit-deep
random_state: 42
use_cross_validation: false
sample_queries: null
features: all
relevance: deep
relevance_noise: 0.2
relevance_quantization: false
train_clicks: 1000000
val_clicks: 500000
test_clicks: 500000
policy_strength: 0
policy_temperature: 0.0
bias_strength: 1.0
use_propensity_weighting: false
data:
  dataset:
    _target_: two_tower_confounding.data.datasets.mslr.MSLR30K
    base_dir: ${dataset_dir}
  preprocessor:
    _target_: two_tower_confounding.data.preprocessing.Preprocessor
    normalize_features: true
    generate_query_document_ids: true
    sample_queries: ${sample_queries}
    top_documents_per_query: 25
    min_relevance_per_query: 1
    random_state: ${random_state}
    relevance: ${relevance}
    features: ${features}
    relevance_noise: ${relevance_noise}
    relevance_quantization: ${relevance_quantization}
logging_policy_ranker:
  _target_: two_tower_confounding.simulation.logging_policy.rankers.NeuralRanker
  model_type: deep
  policy_strength: ${policy_strength}
  random_state: ${random_state}
logging_policy_sampler:
  _target_: two_tower_confounding.simulation.logging_policy.samplers.EGreedySampler
  policy_temperature: ${policy_temperature}
  random_state: ${random_state}
bias_tower:
  _target_: two_tower_confounding.models.towers.EmbeddingBiasTower
  _partial_: true
  positions: ???
  rngs: ???
relevance_tower:
  _target_: two_tower_confounding.models.towers.DeepRelevanceTower
  _partial_: true
  features: ???
  layers: 2
  hidden_units: 32
  dropout: 0
  rngs: ???
