dataset_dir: ~/ltr_datasets
experiment: test_3
random_state: 2021
use_cross_validation: false
sample_queries: null
features: all
relevance: linear
relevance_noise: 0.0
relevance_quantization: false
train_clicks: 100000
val_clicks: 50000
test_clicks: 50000
policy_strength: 1
policy_temperature: 0.0
bias_strength: 1.0
param_shift: -1.0
use_propensity_weighting: false
freeze_bias_tower: true
single_param: true
param_idx: 0
save_test_datasets: false
load_test_datasets: false
test_dataset_name: test_dataset.pkl
test_click_dataset_name: test_click_dataset.pkl
data:
  dataset:
    _target_: two_tower_confounding.data.datasets.custom.CustomDataset
    base_dir: ${dataset_dir}
  preprocessor:
    _target_: two_tower_confounding.data.preprocessing.Preprocessor
    normalize_features: true
    generate_query_document_ids: true
    sample_queries: ${sample_queries}
    top_documents_per_query: 10
    min_relevance_per_query: 1
    random_state: ${random_state}
    relevance: ${relevance}
    features: ${features}
    relevance_noise: ${relevance_noise}
    relevance_quantization: ${relevance_quantization}
logging_policy_ranker:
  _target_: two_tower_confounding.simulation.logging_policy.rankers.NeuralRanker
  model_type: linear
  policy_strength: ${policy_strength}
  random_state: ${random_state}
logging_policy_sampler:
  _target_: two_tower_confounding.simulation.logging_policy.samplers.EGreedySampler
  policy_temperature: ${policy_temperature}
  random_state: ${random_state}
bias_tower:
  _target_: two_tower_confounding.models.towers.EmbeddingBiasTower
  _partial_: true
  positions: ???
  rngs: ???
relevance_tower:
  _target_: two_tower_confounding.models.towers.LinearRelevanceTower
  _partial_: true
  features: ???
  rngs: ???
